name: Auto Approve and Merge

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge open PRs created by GitHub Actions
        env:
          GH_TOKEN: ${{ secrets.MERGE_PAT }}
        run: |
          prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --json number,author --jq '.[] | select(.author.login == "github-actions[bot]" or .author.login == "github-actions" or .author.login == "app/github-actions") | .number')
          if [ -z "$prs" ]; then
            echo "No open PRs from GitHub Actions found."
            exit 0
          fi
          for pr in $prs; do
            echo "Approving and merging PR #$pr..."
            gh pr review "$pr" --repo "$GITHUB_REPOSITORY" --approve
            gh pr merge "$pr" --repo "$GITHUB_REPOSITORY" --squash --admin
          done
